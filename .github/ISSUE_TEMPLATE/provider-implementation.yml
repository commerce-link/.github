name: Provider Implementation
description: Propose a new provider integration (payment, shipping, invoicing, marketplace, or supplier)
labels: ["provider", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for proposing a new provider integration! Commerce Link's plugin architecture makes it straightforward to add new providers.

  - type: dropdown
    id: provider-type
    attributes:
      label: Provider Type
      description: What kind of provider is this?
      options:
        - Payment (payments-api)
        - Invoicing (invoicing-api)
        - Shipping (shipping-api)
        - Marketplace (marketplace-api)
        - Supplier / Inventory (supplier-api)
        - PIM (pim-api)
    validations:
      required: true

  - type: input
    id: provider-name
    attributes:
      label: Provider Name
      description: Name of the service to integrate
      placeholder: e.g., PayPal, DHL, Allegro, WooCommerce
    validations:
      required: true

  - type: input
    id: provider-website
    attributes:
      label: Provider Website / API Docs
      description: Link to the provider's website or API documentation
      placeholder: https://...
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Brief description of the provider and why it would be valuable
    validations:
      required: true

  - type: input
    id: region
    attributes:
      label: Country / Region
      description: What countries or regions does this provider serve?
      placeholder: e.g., Poland, EU, Global

  - type: dropdown
    id: contribution
    attributes:
      label: Contribution
      description: Are you planning to implement this yourself?
      options:
        - Yes, I will submit a PR
        - I can help but need guidance
        - No, this is a suggestion
    validations:
      required: true

  - type: textarea
    id: api-details
    attributes:
      label: API Details
      description: Any relevant details about the provider's API (REST, SOAP, authentication method, etc.)
