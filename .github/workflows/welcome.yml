name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to Commerce Link! Thanks for opening your first issue.

            A maintainer will review it shortly. In the meantime:
            - Make sure you've filled out the issue template completely
            - Check our [Contributing Guidelines](https://github.com/commerce-link/.github/blob/main/CONTRIBUTING.md)
            - For questions, consider using [GitHub Discussions](https://github.com/orgs/commerce-link/discussions) instead

          pr-message: |
            Welcome to Commerce Link! Thanks for your first pull request.

            A maintainer will review it shortly. Please make sure:
            - `mvn clean compile` passes
            - You've followed the PR template checklist
            - No credentials or secrets are included in the changes

            Check our [Contributing Guidelines](https://github.com/commerce-link/.github/blob/main/CONTRIBUTING.md) if you haven't already.
